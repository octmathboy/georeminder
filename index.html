<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoMark — Location Reminders</title>

  <!-- Leaflet.js CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <!-- Google Fonts: Syne (display) + DM Mono (mono utility) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <!-- App Stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════
       SIDEBAR
  ═══════════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">

    <!-- Brand Header -->
    <div class="sidebar__header">
      <div class="sidebar__logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
          <circle cx="14" cy="14" r="13" stroke="var(--accent)" stroke-width="1.5"/>
          <circle cx="14" cy="14" r="5" fill="var(--accent)"/>
          <line x1="14" y1="1" x2="14" y2="6" stroke="var(--accent)" stroke-width="1.5"/>
          <line x1="14" y1="22" x2="14" y2="27" stroke="var(--accent)" stroke-width="1.5"/>
          <line x1="1" y1="14" x2="6" y2="14" stroke="var(--accent)" stroke-width="1.5"/>
          <line x1="22" y1="14" x2="27" y2="14" stroke="var(--accent)" stroke-width="1.5"/>
        </svg>
        <span class="sidebar__brand-text">GeoMark</span>
      </div>
      <p class="sidebar__tagline">Click the map to plant a reminder.</p>
    </div>

    <!-- ── ADD REMINDER FORM (hidden by default) ── -->
    <div class="reminder-form" id="reminderForm" aria-hidden="true">
      <div class="reminder-form__coords" id="coordsDisplay">
        <span class="label">PINNED COORDS</span>
        <span class="coords-value" id="coordsValue">—</span>
      </div>

      <div class="form-group">
        <label for="reminderTitle" class="form-label">Task / Note</label>
        <input
          type="text"
          id="reminderTitle"
          class="form-input"
          placeholder="e.g. Buy groceries at this store"
          autocomplete="off"
          maxlength="80"
        />
      </div>

      <div class="form-group">
        <label for="reminderRadius" class="form-label">
          Alert Radius
          <span class="form-unit">meters</span>
        </label>
        <input
          type="number"
          id="reminderRadius"
          class="form-input"
          placeholder="150"
          min="20"
          max="50000"
          value="150"
        />
      </div>

      <div class="form-actions">
        <button class="btn btn--primary" id="saveBtn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 7L5.5 10.5L12 3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Save Reminder
        </button>
        <button class="btn btn--ghost" id="cancelBtn">Cancel</button>
      </div>
    </div>

    <!-- ── REMINDERS LIST ── -->
    <div class="reminders-section">
      <div class="reminders-section__header">
        <span class="section-title">Active Reminders</span>
        <span class="reminders-count" id="remindersCount">0</span>
      </div>
      <div class="reminders-list" id="remindersList" role="list">
        <!-- Reminder cards injected here via JS -->
        <div class="reminders-empty" id="emptyState">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" opacity="0.3">
            <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="20" cy="20" r="6" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="20" cy="20" r="1.5" fill="currentColor"/>
          </svg>
          <p>No reminders yet.<br/>Click the map to begin.</p>
        </div>
      </div>
    </div>

    <!-- ── QR CODE ── -->
    <div class="qr-section">
      <span class="section-title">Scan to Open on Mobile</span>
      <div class="qr-wrapper" id="qrCodeContainer"></div>
    </div>

  </aside>

  <!-- ═══════════════════════════════════════════
       MAP CANVAS
  ═══════════════════════════════════════════ -->
  <main class="map-container">
    <div id="map"></div>

    <!-- Floating status pill -->
    <div class="map-status" id="mapStatus">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Acquiring location…</span>
    </div>

    <!-- Floating instruction tooltip -->
    <div class="map-hint" id="mapHint">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.2"/>
        <path d="M8 7v5M8 4.5v.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      Click anywhere on the map to set a reminder
    </div>
  </main>

  <!-- ═══════════════════════════════════════════
       SCRIPTS
  ═══════════════════════════════════════════ -->
  <!-- Leaflet.js -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN2GGBc="
    crossorigin=""
  ></script>

  <!-- QRCode.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <!-- App Logic -->
  <script src="app.js"></script>
</body>
</html>
